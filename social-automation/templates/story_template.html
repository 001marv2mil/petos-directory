<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  body {
    width: 1080px;
    height: 1920px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
    background: #111827;
  }

  /* ── Background ── */
  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0f172a 0%, #111827 30%, #064e3b 100%);
  }

  /* ── Glow effects ── */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
  }
  .glow-1 {
    width: 600px; height: 600px;
    top: -100px; left: -100px;
    background: rgba(22, 163, 74, 0.15);
  }
  .glow-2 {
    width: 500px; height: 500px;
    bottom: 200px; right: -100px;
    background: rgba(26, 107, 74, 0.2);
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 120px 72px;
    text-align: center;
  }

  /* ── Logo ── */
  .logo {
    font-size: 32px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 80px;
    letter-spacing: -0.5px;
  }
  .logo span { color: #4ade80; }

  /* ── Hook text ── */
  .hook {
    font-size: 72px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.1;
    letter-spacing: -3px;
    margin-bottom: 40px;
    max-width: 900px;
  }
  .hook .green { color: #4ade80; }

  /* ── City / Category tag ── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(22, 163, 74, 0.2);
    border: 2px solid rgba(74, 222, 128, 0.3);
    color: #4ade80;
    font-size: 22px;
    font-weight: 600;
    padding: 16px 36px;
    border-radius: 100px;
    margin-bottom: 48px;
  }

  /* ── Description ── */
  .desc {
    font-size: 28px;
    font-weight: 400;
    color: #9ca3af;
    line-height: 1.6;
    max-width: 800px;
    margin-bottom: auto;
  }

  /* ── CTA Button ── */
  .cta {
    background: #16a34a;
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    padding: 28px 64px;
    border-radius: 100px;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .url {
    font-size: 20px;
    color: #6b7280;
    font-weight: 500;
  }

  /* ── Bottom accent ── */
  .accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(90deg, #16a34a, #4ade80, #16a34a);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="content">
    <div class="logo">Pet<span>OS</span></div>

    <div class="hook">
      __HOOK_TEXT__
    </div>

    <div class="tag">
      __TAG_EMOJI__ __TAG_TEXT__
    </div>

    <div class="desc">
      __DESC_TEXT__
    </div>

    <div class="cta">__CTA_TEXT__</div>
    <div class="url">petoshealth.com</div>
  </div>

  <div class="accent"></div>
</body>
</html>
